name: Nexus Evolution Loop

on:
  schedule:
    # Roz raat ko 00:00 (12:00 AM) par chalega
    - cron: '0 0 * * *'
  workflow_dispatch: # Taaki aap jab chahe manually run kar sakein

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ye zaroori hai taaki script push kar sake
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Evolution Engine
        run: |
          # Sabse pehle creatures folder banao
          mkdir -p creatures
          # Manager (God Engine) ko chalao
          python core/god_engine.py

      - name: Commit Evolution
        run: |
          # Git configuration
          git config --global user.name 'Nexus-Evolution-Bot'
          git config --global user.email 'bot@nexus.core'
          
          # Nayi files aur changes ko add karo
          git add .
          
          # Check karo ki kya koi change hua hai, tabhi commit karo
          if ! git diff --cached --quiet; then
            git commit -m "Evolution Log: $(date +'%Y-%m-%d') | System nodes synchronized"
            git push
          else
            echo "No changes to commit."
          fi
